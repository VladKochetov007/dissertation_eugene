<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Africa FTZ Network</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #map {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    background: #0a0e17;
  }

  /* sidebar */
  #sidebar {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 100%;
    background: rgba(10, 14, 23, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    z-index: 1000;
    overflow-y: auto;
    padding: 24px 20px;
  }

  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .sidebar-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #f1f5f9;
    margin-bottom: 4px;
  }

  .sidebar-subtitle {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 24px;
  }

  .section-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #475569;
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .stat-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #64748b;
    margin-top: 4px;
  }

  .stat-card.ecowas .stat-value { color: #00d4aa; }
  .stat-card.uemoa .stat-value { color: #818cf8; }
  .stat-card.suspended .stat-value { color: #ff4466; }
  .stat-card.ports .stat-value { color: #fbbf24; }

  .divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.06);
    margin: 16px 0;
  }

  /* filter checkboxes */
  .filter-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    cursor: pointer;
    user-select: none;
  }

  .filter-item:hover { opacity: 0.85; }

  .filter-checkbox {
    width: 14px;
    height: 14px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }

  .filter-checkbox.checked {
    border-color: transparent;
  }

  .filter-checkbox.checked::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 1.5px;
  }

  .filter-label {
    font-size: 11px;
    font-weight: 400;
    color: #94a3b8;
  }

  .filter-count {
    font-size: 10px;
    color: #475569;
    margin-left: auto;
  }

  .edge-line-preview {
    width: 20px;
    height: 2px;
    flex-shrink: 0;
    border-radius: 1px;
  }

  /* Leaflet popup overrides */
  .leaflet-popup-content-wrapper {
    background: rgba(10, 14, 23, 0.95) !important;
    backdrop-filter: blur(12px) !important;
    -webkit-backdrop-filter: blur(12px) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: #e2e8f0 !important;
    font-family: 'JetBrains Mono', monospace !important;
    padding: 0 !important;
  }

  .leaflet-popup-content {
    margin: 0 !important;
    font-size: 11px !important;
    line-height: 1.5 !important;
    min-width: 220px !important;
  }

  .leaflet-popup-tip {
    background: rgba(10, 14, 23, 0.95) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-top: none !important;
    border-left: none !important;
  }

  .popup-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .popup-city {
    font-size: 13px;
    font-weight: 700;
    color: #f1f5f9;
  }

  .popup-country {
    font-size: 10px;
    color: #64748b;
    letter-spacing: 0.04em;
  }

  .popup-body {
    padding: 10px 14px;
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
  }

  .popup-key {
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .popup-val {
    font-size: 11px;
    font-weight: 500;
    color: #e2e8f0;
  }

  .popup-tags {
    padding: 8px 14px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .popup-tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    color: #94a3b8;
    letter-spacing: 0.04em;
  }

  .bloc-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .bloc-ECOWAS { background: rgba(0,212,170,0.15); color: #00d4aa; }
  .bloc-UEMOA { background: rgba(129,140,248,0.15); color: #818cf8; }
  .bloc-SUSPENDED { background: rgba(255,68,102,0.15); color: #ff4466; }
  .bloc-EXTERNAL { background: rgba(148,163,184,0.15); color: #94a3b8; }

  /* legend */
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 10px;
    color: #94a3b8;
  }

  /* leaflet controls */
  .leaflet-control-zoom a {
    background: rgba(10, 14, 23, 0.9) !important;
    color: #94a3b8 !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
    font-family: 'JetBrains Mono', monospace !important;
  }
  .leaflet-control-zoom a:hover {
    background: rgba(20, 28, 45, 0.95) !important;
    color: #e2e8f0 !important;
  }

  .leaflet-control-attribution {
    background: rgba(10, 14, 23, 0.7) !important;
    color: #475569 !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: #64748b !important; }
</style>
</head>

</div>

  {"source":"sikasso","target":"bouake","edge_type":"LABOUR","weight":0.3,"volume":150,"distance_km":450,"is_active":true,"tariff_rate":0,"description":"Southern Malian agricultural labour in central Cote d'Ivoire. Seasonal cocoa/cotton harvest workers. Cross-border at Zegoua. Volume in thousands."},
  {"source":"accra","target":"lagos","edge_type":"LABOUR","weight":0.4,"volume":180,"distance_km":540,"is_active":true,"tariff_rate":0,"description":"Ghanaian professional labour in Nigeria. Nollywood, financial services, academia. Reverse brain-drain flow. Volume in thousands."},
  {"source":"kankan","target":"bamako","edge_type":"LABOUR","weight":0.35,"volume":120,"distance_km":590,"is_active":true,"tariff_rate":0,"description":"Upper Guinea labour to Bamako. Gold mining, urban employment. Mandinka network facilitates placement. Volume in thousands."},
  {"source":"bobo_dioulasso","target":"abidjan","edge_type":"LABOUR","weight":0.25,"volume":400,"distance_km":780,"is_active":true,"tariff_rate":0,"description":"Southwestern Burkina agricultural labour in Cote d'Ivoire. Seasonal and permanent. Cocoa belt employment. Volume in thousands."},
  {"source":"tamale","target":"accra","edge_type":"LABOUR","weight":0.3,"volume":280,"distance_km":610,"is_active":true,"tariff_rate":0,"description":"Internal Ghana north-south labour migration. Northern Region youth to Accra for urban employment. Kayayei (head porters). Volume in thousands."},
  {"source":"kano","target":"lagos","edge_type":"LABOUR","weight":0.3,"volume":500,"distance_km":995,"is_active":true,"tariff_rate":0,"description":"Internal Nigeria north-south labour flow. Hausa traders and workers in Lagos. Almajiri youth. Sabon Gari communities. Volume in thousands."},
  {"source":"praia","target":"dakar","edge_type":"LABOUR","weight":0.5,"volume":40,"distance_km":650,"is_active":true,"tariff_rate":0,"description":"Cape Verdean labour in Senegal. Maritime sector, trade, services. Small but established diaspora community. Volume in thousands."}
];

// ============================================================
// CONFIG
// ============================================================
const BLOC_COLORS = {
  ECOWAS: '#00d4aa',
  UEMOA: '#818cf8',
  SUSPENDED: '#ff4466',
  EXTERNAL: '#94a3b8'
};

const EDGE_COLORS = {
  TRADE: '#ffffff',
  INFRASTRUCTURE: '#fbbf24',
  MIGRATORY: '#22d3ee',
  CULTURAL: '#a78bfa',
  FINANCIAL: '#34d399',
  POLITICAL: '#f97316',
  LABOUR: '#fb7185'
};

const EDGE_DASH = {
  TRADE: null,
  INFRASTRUCTURE: '8 6',
  MIGRATORY: '3 5',
  CULTURAL: null,
  FINANCIAL: null,
  POLITICAL: null,
  LABOUR: null
};

// ============================================================
// MAP INIT
// ============================================================
const map = L.map('map', {
  center: [10.5, -3.0],
  zoom: 5,
  zoomControl: true,
  attributionControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ============================================================
// BUILD CITY LOOKUP
// ============================================================
const cityMap = {};
CITIES.forEach(c => { cityMap[c.id] = c; });

// ============================================================
// COMPUTE STATS
// ============================================================
const stats = {
  nodes: CITIES.length,
  edges: EDGES.length,
  ecowas: CITIES.filter(c => c.bloc === 'ECOWAS').length,
  uemoa: CITIES.filter(c => c.bloc === 'UEMOA').length,
  suspended: CITIES.filter(c => c.bloc === 'SUSPENDED').length,
  ports: CITIES.filter(c => c.is_port).length
};

document.getElementById('stat-nodes').textContent = stats.nodes;
document.getElementById('stat-edges').textContent = stats.edges;
document.getElementById('stat-ecowas').textContent = stats.ecowas;
document.getElementById('stat-uemoa').textContent = stats.uemoa;
document.getElementById('stat-suspended').textContent = stats.suspended;
document.getElementById('stat-ports').textContent = stats.ports;

// ============================================================
// EDGE TYPE COUNTS + FILTER STATE
// ============================================================
const edgeTypes = ['TRADE', 'INFRASTRUCTURE', 'MIGRATORY', 'CULTURAL', 'FINANCIAL', 'POLITICAL', 'LABOUR'];
const edgeTypeCounts = {};
edgeTypes.forEach(t => { edgeTypeCounts[t] = 0; });
EDGES.forEach(e => { edgeTypeCounts[e.edge_type]++; });

const filterState = {};
edgeTypes.forEach(t => { filterState[t] = true; });

// ============================================================
// DRAW EDGES
// ============================================================
const edgeLayers = {};
edgeTypes.forEach(t => { edgeLayers[t] = L.layerGroup().addTo(map); });

function getMaxVolume(type) {
  let mx = 0;
  EDGES.forEach(e => {
    if (e.edge_type === type && e.volume > mx) mx = e.volume;
  });
  return mx || 1;
}

const maxTradeVol = getMaxVolume('TRADE');
const maxMigVol = getMaxVolume('MIGRATORY');

EDGES.forEach(e => {
  const src = cityMap[e.source];
  const tgt = cityMap[e.target];
  if (!src || !tgt) return;

  let wt = 1.5;
  if (e.edge_type === 'TRADE' && e.volume > 0) {
    wt = 1 + (e.volume / maxTradeVol) * 4;
  } else if (e.edge_type === 'MIGRATORY' && e.volume > 0) {
    wt = 1 + (e.volume / maxMigVol) * 3;
  } else if (e.edge_type === 'LABOUR' && e.volume > 0) {
    wt = 1.2 + (e.volume / 1200) * 2.5;
  } else if (e.edge_type === 'INFRASTRUCTURE') {
    wt = 2;
  }

  const opts = {
    color: EDGE_COLORS[e.edge_type],
    weight: wt,
    opacity: 0.35,
    interactive: false
  };

  if (EDGE_DASH[e.edge_type]) {
    opts.dashArray = EDGE_DASH[e.edge_type];
  }

  const line = L.polyline([[src.lat, src.lng], [tgt.lat, tgt.lng]], opts);
  edgeLayers[e.edge_type].addLayer(line);
});

// ============================================================
// BUILD FILTER UI
// ============================================================
const filtersContainer = document.getElementById('edge-filters');

edgeTypes.forEach(type => {
  const item = document.createElement('div');
  item.className = 'filter-item';

  const cb = document.createElement('div');
  cb.className = 'filter-checkbox checked';
  cb.style.backgroundColor = EDGE_COLORS[type];
  cb.dataset.type = type;

  cb.style.cssText += `; --bg: ${EDGE_COLORS[type]};`;

  const updateCb = () => {
    if (filterState[type]) {
      cb.classList.add('checked');
      cb.style.backgroundColor = EDGE_COLORS[type];
      cb.style.borderColor = 'transparent';
    } else {
      cb.classList.remove('checked');
      cb.style.backgroundColor = 'transparent';
      cb.style.borderColor = 'rgba(255,255,255,0.2)';
    }
  };
  updateCb();

  const preview = document.createElement('div');
  preview.className = 'edge-line-preview';
  preview.style.backgroundColor = EDGE_COLORS[type];
  if (EDGE_DASH[type]) {
    preview.style.background = `repeating-linear-gradient(90deg, ${EDGE_COLORS[type]} 0px, ${EDGE_COLORS[type]} 4px, transparent 4px, transparent 7px)`;
    preview.style.backgroundColor = 'transparent';
  }

  const label = document.createElement('span');
  label.className = 'filter-label';
  label.textContent = type.charAt(0) + type.slice(1).toLowerCase();

  const count = document.createElement('span');
  count.className = 'filter-count';
  count.textContent = edgeTypeCounts[type];

  item.appendChild(cb);
  item.appendChild(preview);
  item.appendChild(label);
  item.appendChild(count);

  item.addEventListener('click', () => {
    filterState[type] = !filterState[type];
    updateCb();
    if (filterState[type]) {
      map.addLayer(edgeLayers[type]);
    } else {
      map.removeLayer(edgeLayers[type]);
    }
  });

  filtersContainer.appendChild(item);
});

// ============================================================
// DRAW CITY NODES
// ============================================================
const popScale = Math.max(...CITIES.map(c => c.population));

CITIES.forEach(city => {
  const r = 4 + Math.sqrt(city.population / popScale) * 14;
  const color = BLOC_COLORS[city.bloc] || '#94a3b8';

  const opts = {
    radius: r,
    fillColor: color,
    fillOpacity: 0.7,
    color: city.is_port ? '#fbbf24' : color,
    weight: city.is_port ? 2.5 : 1,
    opacity: city.is_port ? 0.9 : 0.5
  };

  const marker = L.circleMarker([city.lat, city.lng], opts).addTo(map);

  // popup
  const popFmt = city.population >= 1000000
    ? (city.population / 1000000).toFixed(1) + 'M'
    : (city.population / 1000).toFixed(0) + 'K';

  const tagsHtml = city.tags.map(t => `<span class="popup-tag">${t}</span>`).join('');

  const html = `
    <div class="popup-header">
      <span class="popup-city">${city.name}</span>
      <span class="bloc-badge bloc-${city.bloc}">${city.bloc}</span>
      <div class="popup-country">${city.country} (${city.country_iso3})</div>
    </div>
    <div class="popup-body">
      <div class="popup-row"><span class="popup-key">Population</span><span class="popup-val">${popFmt}</span></div>
      <div class="popup-row"><span class="popup-key">GDP/cap</span><span class="popup-val">$${city.gdp_per_capita.toLocaleString()}</span></div>
      <div class="popup-row"><span class="popup-key">Port</span><span class="popup-val">${city.is_port ? 'Yes' : 'No'}</span></div>
      <div class="popup-row"><span class="popup-key">Capital</span><span class="popup-val">${city.is_capital ? 'Yes' : 'No'}</span></div>
      <div class="popup-row"><span class="popup-key">CFA zone</span><span class="popup-val">${city.cfa_zone ? 'Yes' : 'No'}</span></div>
      <div class="popup-row"><span class="popup-key">FTZ target</span><span class="popup-val">${city.is_ftz_target ? 'Yes' : 'No'}</span></div>
      <div class="popup-row"><span class="popup-key">Trade open</span><span class="popup-val">${(city.trade_openness * 100).toFixed(0)}%</span></div>
      <div class="popup-row"><span class="popup-key">EoDB score</span><span class="popup-val">${city.ease_of_business}</span></div>
    </div>
    <div class="popup-tags">${tagsHtml}</div>
  `;

  marker.bindPopup(html, {
    maxWidth: 280,
    className: ''
  });

  // hover effect
  marker.on('mouseover', function () {
    this.setStyle({ fillOpacity: 1, weight: city.is_port ? 3 : 2 });
  });
  marker.on('mouseout', function () {
    this.setStyle({ fillOpacity: 0.7, weight: city.is_port ? 2.5 : 1 });
  });
});
</script>
</body>
</html>
